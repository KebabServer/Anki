  <div id="card-container" class="w-full max-w-3xl bg-slate-800/90 border border-slate-700 rounded-xl shadow-2xl p-5 sm:p-6 min-h-[460px] flex flex-col justify-between relative fade-enter">

   <div class="flex flex-wrap items-center justify-between gap-3 bg-slate-900/60 p-2.5 rounded-xl border border-slate-700/40 mb-4 text-xs">
  <div class="flex items-center gap-2 flex-grow max-w-md">
    <label for="quiz-selector" class="text-slate-400 font-semibold whitespace-nowrap">Jump to Deck Item:</label>
    <select id="quiz-selector" class="bg-slate-800 text-slate-200 border border-slate-700 rounded px-2.5 py-1.5 focus:outline-none focus:border-blue-500 w-full cursor-pointer font-mono text-[11px]">
      </select>
  </div>
  
  <button id="reset-memory-btn" class="bg-red-950/40 hover:bg-red-900/60 border border-red-800/60 text-red-300 px-3 py-1.5 rounded-lg font-medium transition-colors cursor-pointer whitespace-nowrap">
    Reset Engine Memory
  </button>
</div>
  
  <script src="RenderAdvancedPokerMode.js" type="text/javascript"></script>
  <script>
    // --- INTEGRATED SUIT MAP & RENDER LOGIC ---
    const SUIT_MAP = {
      'h': { className: 'hearts', symbol: '♥' },
      'd': { className: 'diamonds', symbol: '♦' },
      'c': { className: 'clubs', symbol: '♣' },
      's': { className: 'spades', symbol: '♠' }
    };

    function parseCardHtml(cardStr) {
      if (cardStr === '??' || !cardStr) return `<div class="card card-back"></div>`;
      const suitLetter = cardStr.slice(-1).toLowerCase();
      const value = cardStr.substring(0, cardStr.length - 1);
      const suitData = SUIT_MAP[suitLetter] || { className: '', symbol: '' };
      return `<div class="card ${suitData.className}"><span>${value}</span><span>${suitData.symbol}</span></div>`;
    }

    function generateChipStackHtml(betString) {
      const numVal = parseFloat(betString);
      if (isNaN(numVal) || numVal <= 0) return '';

      let chipColor = '#cbd5e1';
      if (numVal >= 1 && numVal < 2.5) chipColor = '#ef4444';
      if (numVal >= 2.5 && numVal < 10) chipColor = '#3b82f6';
      if (numVal >= 10) chipColor = '#334155';

      let dynamicStackCount = 1;
      if (numVal > 1.5) dynamicStackCount = 2;
      if (numVal >= 2.5) dynamicStackCount = 3;
      if (numVal >= 8) dynamicStackCount = 4;
      if (numVal >= 11) dynamicStackCount = 5;

      let htmlString = '<div class="chip-stack">';
      for (let i = 0; i < dynamicStackCount; i++) {
        htmlString += `<div class="poker-chip" style="background: ${chipColor}; bottom: ${i * 2}px; z-index: ${i};"></div>`;
      }
      return htmlString + '</div>';
    }

    // --- FALLBACK INTERNAL REPOSITORY (Used if data.json fetch fails/CORS) ---
    const fallbackDeck = [
      {
        "nodeId": "anki_demo_001",
        "quizType": "anki",
        "question": "Explain the architectural difference between a Monolith and Microservices.",
        "answer": "A Monolith executes all computing layers inside a unified process pipeline. Microservices isolate distinct operational domains into decoupled, independently deployable services cooperating over safe REST APIs or message brokers."
      },
      {
        "nodeId": "poker_demo_001",
        "title": "BB Defense vs BTN Open Strategy Matrix",
        "phase": "PREFLOP",
        "pot": "3.50 BB",
        "communityCards": [],
        "quizType": "poker_drag",
        "displayText": "The Button opens to 2.50 BB. Small Blind folds. Action shifts entirely to you in the Big Blind with effective stack metrics.",
        "players": [
          {"position": "UTG", "isActive": false, "isTurn": false, "stackSize": "100.00 BB", "currentBet": "0.00 BB"},
          {"position": "HJ", "isActive": false, "isTurn": false, "stackSize": "100.00 BB", "currentBet": "0.00 BB"},
          {"position": "CO", "isActive": false, "isTurn": false, "stackSize": "100.00 BB", "currentBet": "0.00 BB"},
          {"position": "BTN", "isActive": true, "isTurn": false, "stackSize": "100.00 BB", "currentBet": "2.50 BB"},
          {"position": "SB", "isActive": false, "isTurn": false, "stackSize": "99.50 BB", "currentBet": "0.50 BB"},
          {"position": "BB", "isActive": true, "isTurn": true, "stackSize": "89.00 BB", "currentBet": "1.00 BB", "holeCards": ["Ah", "Kh"], "isHero": true}
        ],
        "choices": [
          {"hand": "AhKh", "targetCategory": "Raise/3-Bet"},
          {"hand": "2h2d", "targetCategory": "Call"}
        ]
      },
      {
        "nodeId": "mc_demo_001",
        "quizType": "multiple_choice",
        "question": "Which of the following describes an idempotent API method execution footprint?",
        "options": [
          "Every execution modifies server memory state deterministically.",
          "Making multiple identical requests has the same side-effect profile as a single request.",
          "The method guarantees encryption handling routines via SSL headers.",
          "Requests always return cached values without executing database calls."
        ],
        "correctIndex": 1
      },
      {
        "nodeId": "drag_demo_001",
        "quizType": "drag_drop",
        "question": "Sort these technical technologies into their proper infrastructure layers:",
        "choices": [
          { "text": "Tailwind CSS", "targetCategory": "UI / Client Layer" },
          { "text": "PostgreSQL", "targetCategory": "Data Persistence" },
          { "text": "Vue.js Engine", "targetCategory": "UI / Client Layer" },
          { "text": "Redis Cache", "targetCategory": "Data Persistence" }
        ]
      },
      {
        "nodeId": "poker_demo_002",
        "title": "Flop C-Bet Strategy Validation",
        "phase": "FLOP",
        "pot": "6.50 BB",
        "communityCards": ["As", "9h", "2c"],
        "quizType": "poker_drag",
        "displayText": "You raised Preflop from the Button and the Big Blind called. The Big Blind checks to you on an Ace-High dry texture.",
        "players": [
          {"position": "UTG", "isActive": false, "isTurn": false, "stackSize": "100.00 BB", "currentBet": "0.00 BB"},
          {"position": "HJ", "isActive": false, "isTurn": false, "stackSize": "100.00 BB", "currentBet": "0.00 BB"},
          {"position": "CO", "isActive": false, "isTurn": false, "stackSize": "100.00 BB", "currentBet": "0.00 BB"},
          {"position": "BTN", "isActive": true, "isTurn": true, "stackSize": "96.50 BB", "currentBet": "0.00 BB", "holeCards": ["Kh", "Qh"], "isHero": true},
          {"position": "SB", "isActive": false, "isTurn": false, "stackSize": "100.00 BB", "currentBet": "0.00 BB"},
          {"position": "BB", "isActive": true, "isTurn": false, "stackSize": "96.50 BB", "currentBet": "0.00 BB"}
        ],
        "choices": [
          {"hand": "KhQh", "targetCategory": "Bet (Bluff)"}
        ]
      }
    ];

    // --- UTILITY CONTROLS EXTENSION INITIALIZATION ---
    function initEngineUtilities(deckData, activeIndexCallback) {
      const selector = document.getElementById('quiz-selector');
      const resetBtn = document.getElementById('reset-memory-btn');

      // 1. Populate Dropdown Options Dynamically
      if (selector && Array.isArray(deckData)) {
        selector.innerHTML = deckData.map((card, idx) => {
          const typeLabel = card.quizType ? `[${card.quizType.toUpperCase()}]` : '[QUIZ]';
          const summaryText = card.question || card.title || card.displayText || `Item ${idx + 1}`;
          const truncatedSummary = summaryText.length > 45 ? summaryText.substring(0, 45) + '...' : summaryText;
          
          return `<option value="${idx}">${typeLabel} ${truncatedSummary}</option>`;
        }).join('');

        // Sync selector value with runtime state
        selector.value = currentCardIndex;

        // Handle user manual dropdown navigation selection change
        selector.addEventListener('change', (e) => {
          const selectedIdx = parseInt(e.target.value, 10);
          currentCardIndex = selectedIdx;
          
          const container = document.getElementById('card-container');
          currentCard = deck[currentCardIndex];
          
          if (currentCard && container) {
            renderCardRouter(currentCard, container);
          }
          
          if (typeof activeIndexCallback === 'function') {
            activeIndexCallback(selectedIdx);
          }
        });
      }

      // 2. Memory Clear Implementation
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          const configurationConfirmed = confirm(
            "Are you absolutely sure you want to reset your engine memory?\n\nThis will permanently wipe all local storage quiz logs, tracking metrics, and historical card mastery rankings. This operation cannot be undone."
          );
          
          if (configurationConfirmed) {
            localStorage.removeItem('flashcard_engine_stats');
            window.location.reload();
          }
        });
      }
    }

    // --- APPLICATION CORE RUNTIME ARCHITECTURE ---
    let deck = [];
    let sessionQueue = [];
    let currentCard = null;
    let currentCardIndex = 0; // Fixed: Global tracking initialization variable
    let stats = JSON.parse(localStorage.getItem('flashcard_engine_stats')) || {};
    let isCompactMode = true; 

    let sessionTotal = 0;
    let sessionCompleted = 0;
    let draggedElement = null;

    async function init() {
      try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Network configuration lookup error.');
        deck = await response.json();
      } catch (error) {
        console.warn('Could not cleanly load an external data.json resource. Falling back onto the embedded runtime repository.');
        deck = fallbackDeck;
      }
      
      initEngineUtilities(deck); 
      
      sessionQueue = deck.filter(card => !stats[card.nodeId] || stats[card.nodeId] < 2);
      
      if (sessionQueue.length === 0) {
        sessionQueue = [...deck];
        stats = {};
        localStorage.removeItem('flashcard_engine_stats');
      }

      sessionTotal = sessionQueue.length;
      sessionCompleted = 0;
      updateProgress();
      nextCard();
    }

    function updateProgress() {
      document.getElementById('progress-text').innerText = `${sessionCompleted} / ${sessionTotal} Decks Evaluation`;
      const pct = sessionTotal === 0 ? 0 : (sessionCompleted / sessionTotal) * 100;
      document.getElementById('progress-bar').style.width = `${pct}%`;
    }

    function saveProgress(nodeId, masteryValue) {
      stats[nodeId] = masteryValue;
      localStorage.setItem('flashcard_engine_stats', JSON.stringify(stats));
    }

    function handleCardComplete(masteryValue) {
      saveProgress(currentCard.nodeId, masteryValue);
      if (masteryValue === 0) {
        sessionQueue.push(currentCard);
        sessionTotal++;
      }
      sessionCompleted++;
      updateProgress();
      nextCard();
    }

    function nextCard() {
      const container = document.getElementById('card-container');
      container.classList.remove('fade-enter');
      void container.offsetWidth; 
      container.classList.add('fade-enter');

      if (sessionQueue.length === 0) {
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center text-center py-12 flex-grow">
            <div class="bg-green-900/40 p-4 rounded-full border border-green-600/30 mb-4 animate-bounce">🎯</div>
            <h2 class="text-2xl font-bold text-green-400 mb-2">Deck Pipeline Evaluated!</h2>
            <p class="text-slate-400 text-sm max-w-sm">Spaced repetition interval registers all cards in active loops as synchronized.</p>
            <button onclick="localStorage.removeItem('flashcard_engine_stats'); location.reload();" class="mt-6 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-xs font-semibold tracking-wide transition-colors">Reset Local Cache & Re-run</button>
          </div>
        `;
        return;
      }

      currentCard = sessionQueue.shift();
      
      // Fixed: Keeps the dropdown selector matching the current card's row index context
      currentCardIndex = deck.indexOf(currentCard);
      const selector = document.getElementById('quiz-selector');
      if (selector) selector.value = currentCardIndex;

      renderCardRouter(currentCard, container);
    }

    function renderCardRouter(card, container) {
      container.innerHTML = '';
      switch (card.quizType) {
        case 'anki': return renderAnkiMode(card, container);
        case 'multiple_choice': return renderMultipleChoiceMode(card, container);
        case 'drag_drop': return renderStandardDragDropMode(card, container);
        case 'poker_drag': return renderAdvancedPokerMode(card, container);
        default: container.innerHTML = `<p class="text-red-400 p-4">Unknown card architecture exception context: ${card.quizType}</p>`;
      }
    }

    // --- 1. MODE: STANDARD ANKI RATING FLASHCARD ---
    function renderAnkiMode(card, container) {
      container.innerHTML = `
        <div class="flex-grow flex flex-col justify-between h-full">
          <div>
            <span class="text-[10px] uppercase tracking-widest font-mono bg-blue-900/60 border border-blue-700/40 text-blue-300 px-2 py-0.5 rounded">Standard Flashcard</span>
            <h2 class="text-lg font-medium text-white mt-4 leading-relaxed">${card.question}</h2>
          </div>
          
          <div id="answer-area" class="hidden flex-col w-full mt-6 bg-slate-900/40 border border-slate-700/50 rounded-xl p-4">
            <div id="html-answer-target" class="text-sm text-slate-300 leading-relaxed"></div>
            
            <div class="grid grid-cols-3 gap-3 mt-6">
              <button onclick="handleCardComplete(0)" class="px-3 py-2 bg-red-950/40 hover:bg-red-900 text-red-200 text-xs font-semibold rounded-lg transition-all border border-red-800/40">Badly (Re-queue)</button>
              <button onclick="handleCardComplete(1)" class="px-3 py-2 bg-yellow-950/40 hover:bg-yellow-900 text-yellow-200 text-xs font-semibold rounded-lg transition-all border border-yellow-800/40">OK (Keep Loop)</button>
              <button onclick="handleCardComplete(2)" class="px-3 py-2 bg-green-950/40 hover:bg-green-900 text-green-200 text-xs font-semibold rounded-lg transition-all border border-green-800/40">Well (Mastered)</button>
            </div>
          </div>
          
          <button id="show-btn" class="mt-8 w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-bold tracking-wide transition-colors shadow-lg shadow-blue-900/30">Show Answer Formulation</button>
        </div>
      `;

      document.getElementById('html-answer-target').innerHTML = card.answer;

      document.getElementById('show-btn').addEventListener('click', (e) => {
        e.target.classList.add('hidden');
        const ans = document.getElementById('answer-area');
        ans.classList.remove('hidden');
        ans.classList.add('flex');
      });
    }

    // --- 2. MODE: MULTIPLE CHOICE OPTION PARSER ---
    function renderMultipleChoiceMode(card, container) {
      const optionsHtml = card.options.map((opt, i) => 
        `<button data-idx="${i}" class="mc-btn w-full text-left p-3.5 bg-slate-700/60 hover:bg-slate-700 rounded-xl border border-slate-600/50 text-xs transition-all flex items-start gap-3"><span class="bg-slate-800 border border-slate-600 text-slate-400 font-mono text-[10px] px-1.5 py-0.5 rounded">${String.fromCharCode(65+i)}</span> <span class="text-slate-200">${opt}</span></button>`
      ).join('');

      container.innerHTML = `
        <div class="flex-grow flex flex-col justify-between h-full">
          <div>
            <span class="text-[10px] uppercase tracking-widest font-mono bg-indigo-900/60 border border-indigo-700/40 text-indigo-300 px-2 py-0.5 rounded">Multiple Choice</span>
            <h2 class="text-lg font-medium text-white mt-4 mb-6 leading-relaxed">${card.question}</h2>
            <div class="flex flex-col gap-2.5" id="mc-options">${optionsHtml}</div>
          </div>
          <button id="mc-next" class="hidden mt-6 w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-bold transition-all">Advance Deck Loop</button>
        </div>
      `;

      const btns = container.querySelectorAll('.mc-btn');
      btns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          const currentTarget = e.currentTarget;
          if (container.querySelector('.pointer-events-
