<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Spaced Repetition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .fade-enter { animation: fadeIn 0.3s ease-in forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .drag-active { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.1); }
    .poker-table { background: radial-gradient(circle, #065f46 0%, #022c22 100%); }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4 sm:p-8">

  <div class="w-full max-w-3xl mb-6">
    <div class="flex justify-between items-end mb-2">
      <h1 class="text-2xl font-bold tracking-tight text-white">Quiz Session</h1>
      <span id="progress-text" class="text-sm text-slate-400">0 / 0 Cards</span>
    </div>
    <div class="w-full bg-slate-800 rounded-full h-2.5">
      <div id="progress-bar" class="bg-blue-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
  </div>

  <div id="card-container" class="w-full max-w-3xl bg-slate-800 rounded-xl shadow-2xl p-6 sm:p-8 min-h-[400px] flex flex-col relative fade-enter">
    <div class="flex items-center justify-center h-full text-slate-400">Loading deck...</div>
  </div>

  <script>
    /** * DATA ARCHITECTURE & MOCK DATA
     * In a real deployment, this loads from data.json. 
     * Mock data is provided here as a fallback to ensure the app runs immediately.
     */
    const fallbackDeck = [
      {
        "nodeId": "anki_001",
        "quizType": "anki",
        "question": "What is the capital of Finland?",
        "answer": "Helsinki"
      },
      {
        "nodeId": "mc_001",
        "quizType": "multiple_choice",
        "question": "Which array method adds an element to the end of an array in JavaScript?",
        "options": ["shift()", "push()", "pop()", "unshift()"],
        "correctIndex": 1
      },
      {
        "nodeId": "drag_001",
        "quizType": "drag_drop",
        "question": "Sort these frontend technologies:",
        "choices": [
          { "text": "React", "targetCategory": "Framework/Library" },
          { "text": "CSS", "targetCategory": "Styling" },
          { "text": "Tailwind", "targetCategory": "Styling" },
          { "text": "Vue", "targetCategory": "Framework/Library" }
        ]
      },
      {
        "nodeId": "preflop_001",
        "title": "BB Defense vs BTN Open",
        "phase": "PREFLOP",
        "pot": "3.50 BB",
        "communityCards": [],
        "quizType": "poker_drag",
        "displayText": "The BTN opens to 2.5 BB. Action is on you in the Big Blind.",
        "players": [
          {"position": "UTG", "isActive": false, "isTurn": false, "stackSize": "100 BB", "currentBet": "0 BB"},
          {"position": "HJ", "isActive": false, "isTurn": false, "stackSize": "100 BB", "currentBet": "0 BB"},
          {"position": "CO", "isActive": false, "isTurn": false, "stackSize": "100 BB", "currentBet": "0 BB"},
          {"position": "BTN", "isActive": true, "isTurn": false, "stackSize": "100 BB", "currentBet": "2.50 BB"},
          {"position": "SB", "isActive": false, "isTurn": false, "stackSize": "99.50 BB", "currentBet": "0.50 BB"},
          {"position": "BB", "isActive": true, "isTurn": true, "stackSize": "89.00 BB", "currentBet": "1.00 BB", "holeCards": ["Ah", "Kh"], "isHero": true}
        ],
        "choices": [
          {"hand": "AhKh", "targetCategory": "Raise/3-Bet"},
          {"hand": "2h2d", "targetCategory": "Call"}
        ]
      }
    ];

    // --- APPLICATION STATE ---
    let deck = [];
    let sessionQueue = [];
    let currentCard = null;
    let stats = JSON.parse(localStorage.getItem('flashcard_stats')) || {};
    let sessionTotal = 0;
    let sessionCompleted = 0;

    // --- INITIALIZATION ---
    async function init() {
      try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('data.json not found');
        deck = await response.json();
      } catch (error) {
        console.warn('Could not load data.json, using fallback data.');
        deck = fallbackDeck;
      }
      
      // Filter out cards mastered ("Well" - state 2) today for spaced repetition
      // For this demo, we just load everything not marked '2'
      sessionQueue = deck.filter(card => !stats[card.nodeId] || stats[card.nodeId] < 2);
      
      if (sessionQueue.length === 0) {
        // Reset if all done
        sessionQueue = [...deck];
        stats = {}; 
        localStorage.removeItem('flashcard_stats');
      }

      sessionTotal = sessionQueue.length;
      sessionCompleted = 0;
      updateProgress();
      nextCard();
    }

    // --- CORE LOGIC ---
    function updateProgress() {
      document.getElementById('progress-text').innerText = `${sessionCompleted} / ${sessionTotal} Cards`;
      const pct = sessionTotal === 0 ? 0 : (sessionCompleted / sessionTotal) * 100;
      document.getElementById('progress-bar').style.width = `${pct}%`;
    }

    function saveProgress(nodeId, score) {
      // score: 0 (Badly), 1 (OK), 2 (Well)
      stats[nodeId] = score;
      localStorage.setItem('flashcard_stats', JSON.stringify(stats));
    }

    function handleCardComplete(score) {
      saveProgress(currentCard.nodeId, score);
      if (score === 0) {
        // Re-queue at the end
        sessionQueue.push(currentCard);
        sessionTotal++;
      }
      sessionCompleted++;
      updateProgress();
      nextCard();
    }

    function nextCard() {
      const container = document.getElementById('card-container');
      container.classList.remove('fade-enter');
      void container.offsetWidth; // Trigger reflow
      container.classList.add('fade-enter');

      if (sessionQueue.length === 0) {
        container.innerHTML = `<div class="text-center mt-10"><h2 class="text-3xl text-green-400 font-bold mb-4">Session Complete!</h2><p class="text-slate-400">You've finished all cards for now.</p></div>`;
        return;
      }

      currentCard = sessionQueue.shift();
      renderCard(currentCard, container);
    }

    // --- RENDERING ROUTER ---
    function renderCard(card, container) {
      container.innerHTML = ''; 
      switch (card.quizType) {
        case 'anki': return renderAnki(card, container);
        case 'multiple_choice': return renderMultipleChoice(card, container);
        case 'drag_drop': return renderDragDrop(card, container);
        case 'poker_drag': return renderPokerDrag(card, container);
        default: container.innerHTML = `<p class="text-red-400">Unknown quiz type: ${card.quizType}</p>`;
      }
    }

    // --- 1. ANKI RATING SYSTEM ---
    function renderAnki(card, container) {
      container.innerHTML = `
        <div class="flex-grow flex flex-col justify-center items-center text-center">
          <h2 class="text-2xl font-medium text-white mb-8">${card.question}</h2>
          <div id="answer-area" class="hidden flex-col items-center w-full">
            <hr class="w-full border-slate-600 mb-8">
            <p class="text-xl text-slate-300 mb-8">${card.answer}</p>
            <div class="flex gap-4 w-full justify-center">
              <button onclick="handleCardComplete(0)" class="px-6 py-3 bg-red-900/50 hover:bg-red-800 text-red-200 rounded-lg transition-colors border border-red-700/50">Badly</button>
              <button onclick="handleCardComplete(1)" class="px-6 py-3 bg-yellow-900/50 hover:bg-yellow-800 text-yellow-200 rounded-lg transition-colors border border-yellow-700/50">OK</button>
              <button onclick="handleCardComplete(2)" class="px-6 py-3 bg-green-900/50 hover:bg-green-800 text-green-200 rounded-lg transition-colors border border-green-700/50">Well</button>
            </div>
          </div>
          <button id="show-btn" class="mt-auto w-full max-w-sm py-4 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition-colors">Show Answer</button>
        </div>
      `;
      document.getElementById('show-btn').addEventListener('click', (e) => {
        e.target.classList.add('hidden');
        document.getElementById('answer-area').classList.remove('hidden');
        document.getElementById('answer-area').classList.add('flex');
      });
    }

    // --- 2. MULTIPLE CHOICE ---
    function renderMultipleChoice(card, container) {
      const optionsHtml = card.options.map((opt, i) => 
        `<button data-idx="${i}" class="mc-btn w-full text-left p-4 bg-slate-700 hover:bg-slate-600 rounded-lg border border-slate-600 transition-colors">${opt}</button>`
      ).join('');

      container.innerHTML = `
        <h2 class="text-2xl font-medium text-white mb-8">${card.question}</h2>
        <div class="flex flex-col gap-3" id="mc-options">${optionsHtml}</div>
        <button id="mc-next" class="hidden mt-8 w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition-colors">Next Card</button>
      `;

      const btns = container.querySelectorAll('.mc-btn');
      btns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (container.querySelector('.pointer-events-none')) return; // already answered
          btns.forEach(b => b.classList.add('pointer-events-none', 'opacity-50'));
          
          const isCorrect = parseInt(e.target.dataset.idx) === card.correctIndex;
          e.target.classList.remove('bg-slate-700', 'hover:bg-slate-600', 'opacity-50');
          
          if (isCorrect) {
            e.target.classList.add('bg-green-600', 'border-green-500', 'text-white');
          } else {
            e.target.classList.add('bg-red-600', 'border-red-500', 'text-white');
            btns[card.correctIndex].classList.remove('opacity-50', 'bg-slate-700');
            btns[card.correctIndex].classList.add('bg-green-600/50', 'border-green-500');
          }

          const nextBtn = document.getElementById('mc-next');
          nextBtn.classList.remove('hidden');
          nextBtn.onclick = () => handleCardComplete(isCorrect ? 2 : 0);
        });
      });
    }

    // --- 3. STANDARD DRAG & DROP ---
    function renderDragDrop(card, container) {
      const categories = [...new Set(card.choices.map(c => c.targetCategory))];
      let draggablesHtml = card.choices.map((c, i) => 
        `<div draggable="true" data-target="${c.targetCategory}" class="cursor-grab active:cursor-grabbing p-3 bg-slate-600 rounded shadow border border-slate-500 text-center" ondragstart="dragStart(event)">${c.text || c.hand}</div>`
      ).join('');

      let dropzonesHtml = categories.map(cat => `
        <div class="flex-1 flex flex-col">
          <h3 class="text-center font-bold text-slate-400 mb-2">${cat}</h3>
          <div data-cat="${cat}" class="dropzone flex-1 bg-slate-800/50 border-2 border-dashed border-slate-600 rounded-xl p-4 flex flex-col gap-2 min-h-[150px]" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropToMatch(event)"></div>
        </div>
      `).join('');

      container.innerHTML = `
        <h2 class="text-xl font-medium text-white mb-6">${card.question || card.displayText}</h2>
        <div id="source-zone" class="flex flex-wrap gap-3 mb-8 p-4 bg-slate-700/30 rounded-xl min-h-[80px]" ondragover="dragOver(event)" ondrop="dropSource(event)">
          ${draggablesHtml}
        </div>
        <div class="flex gap-4 w-full">${dropzonesHtml}</div>
        <button id="dd-next" class="hidden mt-8 w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition-colors">Complete</button>
      `;

      // Attach validation logic globally to card
      container.dataset.totalItems = card.choices.length;
      container.dataset.correctItems = 0;
    }

    // --- 4. POKER STRATEGY MATRIX ---
    function renderPokerDrag(card, container) {
      // 1. Build Table UI
      const positionsHtml = card.players.map(p => {
        const isHero = p.isHero ? 'border-blue-500 bg-blue-900/40 shadow-[0_0_15px_rgba(59,130,246,0.5)]' : 'border-slate-600 bg-slate-800';
        const isTurn = p.isTurn ? 'ring-2 ring-yellow-400' : '';
        const holeCards = p.holeCards && p.holeCards.length ? `<div class="text-xs font-mono mt-1 text-yellow-300">${p.holeCards.join(' ')}</div>` : '';
        
        return `
          <div class="flex flex-col items-center p-2 rounded-lg border ${isHero} ${isTurn}">
            <span class="text-xs font-bold text-slate-400">${p.position}</span>
            <span class="text-sm">${p.stackSize}</span>
            <span class="text-xs text-slate-400 mt-1">${p.currentBet !== '0 BB' && p.currentBet !== '0.00 BB' ? 'Bet: ' + p.currentBet : 'Folded/Wait'}</span>
            ${holeCards}
          </div>
        `;
      }).join('');

      // 2. Build Categories & Draggables
      const categories = [...new Set(card.choices.map(c => c.targetCategory))];
      let draggablesHtml = card.choices.map(c => 
        `<div draggable="true" data-target="${c.targetCategory}" class="cursor-grab active:cursor-grabbing p-3 bg-slate-700 rounded-lg shadow-lg border border-slate-500 text-center font-mono font-bold" ondragstart="dragStart(event)">${c.hand}</div>`
      ).join('');

      let dropzonesHtml = categories.map(cat => `
        <div class="flex-1 flex flex-col">
          <h3 class="text-center text-sm font-bold text-slate-400 mb-2">${cat}</h3>
          <div data-cat="${cat}" class="dropzone flex-1 bg-slate-900/50 border-2 border-dashed border-slate-600 rounded-xl p-3 flex flex-col gap-2 min-h-[100px]" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropToMatch(event)"></div>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="flex justify-between items-start mb-4">
          <h2 class="text-lg font-bold text-white">${card.title} <span class="text-slate-400 text-sm font-normal ml-2">${card.phase}</span></h2>
          <div class="text-right"><span class="text-sm text-slate-400">Pot:</span> <span class="font-bold text-yellow-400">${card.pot}</span></div>
        </div>
        <p class="text-sm text-slate-300 mb-6">${card.displayText}</p>
        
        <div class="poker-table w-full rounded-[3rem] p-6 mb-8 border-4 border-slate-700 shadow-inner grid grid-cols-3 gap-4 items-center justify-center">
          ${positionsHtml}
        </div>

        <div id="source-zone" class="flex justify-center gap-3 mb-6 min-h-[60px]" ondragover="dragOver(event)" ondrop="dropSource(event)">
          ${draggablesHtml}
        </div>

        <div class="flex gap-4 w-full">${dropzonesHtml}</div>
        <button id="dd-next" class="hidden mt-8 w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition-colors">Next Hand</button>
      `;

      container.dataset.totalItems = card.choices.length;
      container.dataset.correctItems = 0;
    }

    // --- DRAG AND DROP HANDLERS ---
    let draggedElement = null;

    function dragStart(e) {
      draggedElement = e.target;
      e.dataTransfer.effectAllowed = 'move';
      // Required for Firefox
      e.dataTransfer.setData('text/plain', e.target.innerText);
      setTimeout(() => e.target.classList.add('opacity-50'), 0);
    }

    function dragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if(e.currentTarget.classList.contains('dropzone')) {
        e.currentTarget.classList.add('drag-active');
      }
    }

    function dragLeave(e) {
      if(e.currentTarget.classList.contains('dropzone')) {
        e.currentTarget.classList.remove('drag-active');
      }
    }

    function dropSource(e) {
      e.preventDefault();
      draggedElement.classList.remove('opacity-50');
      // If dragging back to source, reset styles
      draggedElement.classList.remove('bg-green-600', 'border-green-500', 'bg-red-600', 'border-red-500');
      draggedElement.classList.add('bg-slate-600', 'border-slate-500');
      document.getElementById('source-zone').appendChild(draggedElement);
      checkDragCompletion();
    }

    function dropToMatch(e) {
      e.preventDefault();
      const dropzone = e.currentTarget;
      dropzone.classList.remove('drag-active');
      draggedElement.classList.remove('opacity-50');

      const targetCategory = draggedElement.getAttribute('data-target');
      const dropCategory = dropzone.getAttribute('data-cat');

      dropzone.appendChild(draggedElement);

      // Validation UI feedback
      draggedElement.classList.remove('bg-slate-600', 'border-slate-500', 'bg-slate-700');
      if (targetCategory === dropCategory) {
        draggedElement.classList.add('bg-green-600', 'border-green-500');
        draggedElement.dataset.correct = "true";
      } else {
        draggedElement.classList.add('bg-red-600', 'border-red-500');
        draggedElement.dataset.correct = "false";
      }

      checkDragCompletion();
    }

    function checkDragCompletion() {
      const container = document.getElementById('card-container');
      const total = parseInt(container.dataset.totalItems);
      
      // Count items that are in dropzones and are correct
      const allDraggables = Array.from(container.querySelectorAll('[draggable="true"]'));
      const inDropzones = allDraggables.filter(el => el.parentElement.classList.contains('dropzone'));
      const allCorrect = allDraggables.every(el => el.dataset.correct === "true" && el.parentElement.classList.contains('dropzone'));

      const nextBtn = document.getElementById('dd-next');
      
      if (inDropzones.length === total) {
        nextBtn.classList.remove('hidden');
        // If all are perfectly correct on first try, mark well. Otherwise OK or Badly depending on logic.
        // For simplicity: all correct = Well(2), if they had to drag around = OK(1)
        nextBtn.onclick = () => handleCardComplete(allCorrect ? 2 : 1);
      } else {
        nextBtn.classList.add('hidden');
      }
    }

    // Start App
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
